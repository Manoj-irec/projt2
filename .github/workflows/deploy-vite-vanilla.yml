# Test and deploy to Firebase Hosting
name: Test and deploy to Firebase Hosting

on:
    # Runs on pushes targeting the default branch(s)
    push:
        branches: ["main", "master"]

    # Run on pull requests so tests validate PRs before merge
    pull_request:
        branches: ["main", "master"]

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: "firebase-hosting"
    cancel-in-progress: true
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run automated tests
              run: npm test
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Deploy to Firebase Hosting
              uses: FirebaseExtended/action-hosting-deploy@v0
              with:
                  firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                  projectId: manoj-fir
                  channelId: live
